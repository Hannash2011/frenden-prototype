<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <!-- iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="images/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- Android / PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="images/logo-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/logo-16.png">
</head>

<body>
    <header class="header-page">
        <div class="header-inner">

            <!-- ВЕРХ -->
            <div class="header-top">

                <div class="header-left">
                    <img src="images/logo.png" class="logo-img">
                    <span class="logo-text">FrenDen</span>
                </div>

                <div class="header-right">
                    <div class="chat">💬</div>
                    <div class="profile">👤</div>
                    <div class="login">Login</div>
                </div>

            </div>

            <!-- ПОИСК -->
            <div class="search-block">

                <input type="text" class="main-search" placeholder="What shall we do?">

                <!-- НИЖНЯЯ ПОЛОСА -->
                <div class="search-extra">

                    <!-- LOCATION -->
                    <div class="location-wrapper">
                        <button type="button" class="location" id="locationBtn">
                            🌍 Anywhere
                        </button>
                        <div class="location-dropdown" id="locationDropdown">
                            <div class="location-option">🌍 Anywhere</div>
                            <div class="location-option">📍 Near me</div>

                            <input type="text" id="locationInput" placeholder="Enter city or country...">
                        </div>
                    </div>

                    <!-- DATE -->
                    <button type="button" class="date" id="dateBtn">
                        📅 Any day
                    </button>
                        <input type="date" id="calendar" style="display: none;">
                    

                </div>

                <!-- скрытый календарь -->


                <!-- подсказки -->
                <div class="suggestions" id="suggestions"></div>

            </div>

        </div>
    </header>

    <script>


        /* ===== LOCATION ===== */
        /* ===== LOCATION ===== */
const locationBtn = document.getElementById("locationBtn");
const dropdown = document.getElementById("locationDropdown");
const locationWrapper = document.querySelector(".location-wrapper");
const input = document.getElementById("locationInput");
const options = document.querySelectorAll(".location-option");

const dateBtn = document.getElementById("dateBtn");
const calendar = document.getElementById("calendar");

/* OPEN / CLOSE LOCATION */
locationBtn.onclick = () => {
dropdown.style.display =
dropdown.style.display === "block" ? "none" : "block";
};

/* LOCATION OPTIONS */
options.forEach(option => {
option.onclick = () => {
locationBtn.textContent = option.textContent;
dropdown.style.display = "none";
};
});

/* CUSTOM LOCATION */
input.addEventListener("keydown", function (e) {

if (e.key === "Enter" && input.value.trim() !== "") {

locationBtn.textContent = "📍 " + input.value;
dropdown.style.display = "none";
}
});

/* CLOSE ON OUTSIDE CLICK */
document.addEventListener("click", function (e) {

if (!locationWrapper.contains(e.target)) {
dropdown.style.display = "none";
}
});

/* DATE */
dateBtn.onclick = () => {
calendar.click();
};

calendar.addEventListener("change", function () {

if (!this.value) {
dateBtn.textContent = "📅 Any day";
return;
}

const date = new Date(this.value);

const formatted = date.toLocaleDateString("en-GB", {
day: "numeric",
month: "short"
});

dateBtn.textContent = "📅 " + formatted;
});
