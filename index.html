<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <!-- iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="images/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- Android / PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- Favicon для браузера -->
    <link rel="icon" type="image/png" sizes="32x32" href="images/logo-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/logo-16.png">

</head>


<body>
    <header class="header-page">
        <div class="header-inner">

            <!-- ВЕРХНЯЯ СТРОКА -->
            <div class="header-top">

                <!-- ЛЕВО -->
                <div class="header-left">
                    <img src="images/logo.png" class="logo-img">
                    <span class="logo-text">FrenDen</span>
                </div>

                <!-- ПРАВО -->
                <div class="header-right">
                    <div class="chat">💬</div>
                    <div class="profile">👤</div>
                </div>

            </div>

            <!-- ПОИСК -->
            <div class="search-block">
                <input type="text" class="main-search" placeholder="What shall we do?">

                <div class="search-extra">

                    <div class="filter" id="whereBtn">
                        📍 Where
                    </div>

                    <div class="filter" id="whenBtn">
                        📅 When
                    </div>

                </div>

                <!-- WHEN (КАЛЕНДАРЬ) -->
                <div class="dropdown" id="whenDropdown">
                    <input type="date">
                </div>

                <div class="suggestions" id="suggestions"></div>
            </div>

            <!-- КАЛЕНДАРЬ -->


        </div>
    </header>

    <script>
        const activities = ["Karaoke", "Bar", "Walk", "Cinema", "Cafe", "Concert", "Yoga"];

        function showSuggestions(value) {
            const container = document.getElementById("suggestions");
            container.innerHTML = "";

            if (value.trim() === "") {
                container.style.display = "none";
                return;
            }

            const filtered = activities.filter(act =>
                act.toLowerCase().includes(value.toLowerCase())
            );

            if (filtered.length === 0) {
                container.style.display = "none";
                return;
            }

            filtered.forEach(act => {
                const div = document.createElement("div");
                div.classList.add("suggestion-item");
                div.textContent = act;

                div.onclick = () => {
                    document.querySelector(".search-box").value = act;
                    container.style.display = "none";
                };

                container.appendChild(div);
            });

            container.style.display = "block";
        }

        document.querySelector(".main-search").addEventListener("input", function () {
            showSuggestions(this.value);
        });
    </script>
</body>
