<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="images/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- Android / PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- Favicon для браузера -->
    <link rel="icon" type="image/png" sizes="32x32" href="images/logo-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/logo-16.png">
</head>


<body>
    <header class="header-page">
        <div class="container header-container">
            <!-- Логотип слева -->
            <a class="logo" href="./index.html">
                <img src="images/logo.png" alt="FrenDen" height="40">
            </a>

            <!-- Центральная часть: подпись + поиск -->

            <div class="header-center">
                <div class="header-title">What shall we do?</div>
                <input type="text" class="search-box" placeholder="Search activities..."
                    oninput="showSuggestions(this.value)">

                <!-- Сюда будут подставляться подсказки -->
                <div class="suggestions" id="suggestions"></div>
            </div>

            <!-- Справа: login + профиль -->
            <nav class="header-nav">
                <div class="right">
                    <div class="login">Login</div>
                    <div class="profile">👤</div>
                </div>
            </nav>
        </div>
    </header>
    <script>
        const activities = ["Karaoke", "Bar", "Walk", "Cinema", "Cafe", "Concert", "Yoga"];

        function showSuggestions(value) {
            const container = document.getElementById("suggestions");
            container.innerHTML = "";

            if (value.trim() === "") {
                container.style.display = "none";
                return;
            }

            const filtered = activities.filter(act =>
                act.toLowerCase().includes(value.toLowerCase())
            );

            if (filtered.length === 0) {
                container.style.display = "none";
                return;
            }

            filtered.forEach(act => {
                const div = document.createElement("div");
                div.classList.add("suggestion-item");
                div.textContent = act;

                div.onclick = () => {
                    document.querySelector(".search-box").value = act;
                    container.style.display = "none";
                };

                container.appendChild(div);
            });

            container.style.display = "block";
        }
    </script>
</body>
