<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>FrenDen</title>
    <link rel="stylesheet" href="style.css">
</head>
<header class="header-page">
    <div class="container header-container">
        <!-- Логотип слева -->
        <a class="logo" href="./index.html">
            <img src="logo.png" alt="FrenDen" height="40">
        </a>

        <!-- Центральная часть: подпись + поиск -->
        <div class="header-center">
            <div class="header-title">What shall we do?</div>
            <input type="text" class="search-box" placeholder="Search activities...">
        </div>

        <div class="header-center">
            <div class="header-title">What shall we do?</div>
            <input type="text" class="search-box" placeholder="Search activities..."
                oninput="showSuggestions(this.value)">

            <!-- Сюда будут подставляться подсказки -->
            <div class="suggestions" id="suggestions"></div>
        </div>

        <!-- Справа: login + профиль -->
        <nav class="header-nav">
            <div class="right">
                <div class="login">Login</div>
                <div class="profile">👤</div>
            </div>
        </nav>
    </div>
</header>
